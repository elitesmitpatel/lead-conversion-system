<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lead Pipeline Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --surface-2: #1a1a25;
            --border: #2a2a3a;
            --text: #e8e8f0;
            --text-muted: #6b6b80;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.15);
            --green: #22c55e;
            --yellow: #eab308;
            --red: #ef4444;
            --blue: #3b82f6;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        
        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
            padding: 32px 24px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }
        
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        
        .header .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 4px;
        }
        
        .header-actions {
            display: flex;
            gap: 12px;
        }
        
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: var(--accent);
            color: white;
        }
        
        .btn-primary:hover {
            background: #8b5cf6;
        }
        
        .btn-secondary {
            background: var(--surface-2);
            color: var(--text);
            border: 1px solid var(--border);
        }
        
        /* Metric Cards */
        .metrics {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 32px;
        }
        
        .metric-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }
        
        .metric-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
        }
        
        .metric-card:nth-child(1)::before { background: var(--green); }
        .metric-card:nth-child(2)::before { background: var(--blue); }
        .metric-card:nth-child(3)::before { background: var(--yellow); }
        .metric-card:nth-child(4)::before { background: var(--accent); }
        
        .metric-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        
        .metric-value {
            font-size: 36px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
        }
        
        .metric-change {
            font-size: 13px;
            margin-top: 4px;
        }
        
        .metric-change.up { color: var(--green); }
        .metric-change.down { color: var(--red); }
        
        /* Pipeline */
        .pipeline {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin-bottom: 32px;
        }
        
        .pipeline-column {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            min-height: 400px;
        }
        
        .pipeline-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }
        
        .pipeline-title {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .pipeline-count {
            background: var(--surface-2);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-family: 'JetBrains Mono', monospace;
        }
        
        .lead-card {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .lead-card:hover {
            border-color: var(--accent);
            background: var(--accent-glow);
        }
        
        .lead-name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
        }
        
        .lead-source {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .lead-score {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            font-family: 'JetBrains Mono', monospace;
            margin-top: 6px;
        }
        
        .score-hot { background: rgba(34,197,94,0.15); color: var(--green); }
        .score-warm { background: rgba(234,179,8,0.15); color: var(--yellow); }
        .score-cold { background: rgba(239,68,68,0.15); color: var(--red); }
        
        /* Activity Feed */
        .activity-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
        }
        
        .activity-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        
        .activity-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }
        
        .activity-item:last-child {
            border-bottom: none;
        }
        
        .activity-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }
        
        .activity-icon.reply { background: rgba(34,197,94,0.15); }
        .activity-icon.email { background: rgba(59,130,246,0.15); }
        .activity-icon.booked { background: rgba(99,102,241,0.15); }
        .activity-icon.lead { background: rgba(234,179,8,0.15); }
        
        .activity-text { font-size: 14px; }
        .activity-text strong { font-weight: 600; }
        .activity-time { font-size: 12px; color: var(--text-muted); margin-left: auto; }
        
        /* Loading State */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 200px;
            color: var(--text-muted);
        }
        
        /* Mobile */
        @media (max-width: 768px) {
            .metrics { grid-template-columns: repeat(2, 1fr); }
            .pipeline { grid-template-columns: 1fr; }
            .header { flex-direction: column; align-items: flex-start; gap: 16px; }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="header">
            <div>
                <h1>Lead Pipeline</h1>
                <div class="subtitle" id="agencyName">Loading...</div>
            </div>
            <div class="header-actions">
                <button class="btn btn-secondary" onclick="refreshData()">🔄 Refresh</button>
                <button class="btn btn-primary" onclick="exportCSV()">📥 Export CSV</button>
            </div>
        </div>
        
        <div class="metrics">
            <div class="metric-card">
                <div class="metric-label">Response Rate</div>
                <div class="metric-value" id="responseRate">—</div>
                <div class="metric-change up">↑ Leads contacted within 60s</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Avg Response Time</div>
                <div class="metric-value" id="avgTime">—</div>
                <div class="metric-change up">↓ Faster than manual</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Calls Booked</div>
                <div class="metric-value" id="callsBooked">—</div>
                <div class="metric-change up">↑ This month</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Pipeline Value</div>
                <div class="metric-value" id="pipelineValue">—</div>
                <div class="metric-change up">↑ Potential revenue</div>
            </div>
        </div>
        
        <div class="pipeline" id="pipeline">
            <!-- Rendered by JS -->
        </div>
        
        <div class="activity-section">
            <div class="activity-title">Recent Activity</div>
            <div id="activityFeed">
                <div class="loading">Loading activity...</div>
            </div>
        </div>
    </div>
    
    <script>
        // Get client ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const CLIENT_ID = urlParams.get('client') || localStorage.getItem('client_id') || 'test-client-id';
        
        // Save for future use
        localStorage.setItem('client_id', CLIENT_ID);
        
        // API base URL - update for production
        const API = window.location.origin + '/api';

        async function loadDashboard() {
            try {
                const res = await fetch(`${API}/dashboard/${CLIENT_ID}`);
                
                if (!res.ok) {
                    throw new Error('Failed to load dashboard');
                }
                
                const data = await res.json();
                
                // Update metrics
                document.getElementById('responseRate').textContent = 
                    (data.metrics?.response_rate || 0) + '%';
                document.getElementById('avgTime').textContent = 
                    (data.metrics?.avg_response_time_min || 0) + 'm';
                document.getElementById('callsBooked').textContent = 
                    data.metrics?.booked_calls || 0;
                document.getElementById('pipelineValue').textContent = 
                    '$' + ((data.metrics?.pipeline_value || 0) / 1000).toFixed(0) + 'k';
                
                // Update agency name
                document.getElementById('agencyName').textContent = 
                    'Client Dashboard - Last 30 days';
                
                // Render pipeline columns
                const stages = ['new', 'contacted', 'nurturing', 'booked', 'won'];
                const stageLabels = { 
                    new: 'New', 
                    contacted: 'Contacted', 
                    nurturing: 'Nurturing', 
                    booked: 'Booked', 
                    won: 'Won' 
                };
                
                const pipelineEl = document.getElementById('pipeline');
                pipelineEl.innerHTML = stages.map(stage => {
                    const stageData = data.pipeline?.find(p => p.status === stage) || { count: 0 };
                    return `
                        <div class="pipeline-column">
                            <div class="pipeline-header">
                                <div class="pipeline-title">${stageLabels[stage]}</div>
                                <div class="pipeline-count">${stageData.count || 0}</div>
                            </div>
                            <div id="stage-${stage}"></div>
                        </div>
                    `;
                }).join('');
                
                // Load leads for each stage
                for (const stage of stages) {
                    const leadsRes = await fetch(`${API}/leads/${CLIENT_ID}?status=${stage}`);
                    const leadsData = await leadsRes.json();
                    const container = document.getElementById(`stage-${stage}`);
                    
                    if (leadsData.leads && leadsData.leads.length > 0) {
                        container.innerHTML = leadsData.leads.map(lead => `
                            <div class="lead-card" onclick="viewLead('${lead.id}')">
                                <div class="lead-name">${lead.name || 'Unknown'}</div>
                                <div class="lead-source">${lead.source || 'website'}</div>
                                <span class="lead-score ${getScoreClass(lead.interest_score)}">
                                    ${lead.interest_score || 0}
                                </span>
                            </div>
                        `).join('');
                    } else {
                        container.innerHTML = '<div style="color: var(--text-muted); text-align: center; padding: 20px; font-size: 13px;">No leads</div>';
                    }
                }
                
                // Load activity
                if (data.recent_activity && data.recent_activity.length > 0) {
                    const feedEl = document.getElementById('activityFeed');
                    feedEl.innerHTML = data.recent_activity.map(a => `
                        <div class="activity-item">
                            <div class="activity-icon ${getEventIcon(a.event_type)}">${getEventEmoji(a.event_type)}</div>
                            <div class="activity-text">
                                <strong>${a.lead_name || 'Unknown'}</strong> — ${formatEventType(a.event_type)}
                            </div>
                            <div class="activity-time">${timeAgo(a.created_at)}</div>
                        </div>
                    `).join('');
                }
                
            } catch (error) {
                console.error('Error loading dashboard:', error);
                document.getElementById('activityFeed').innerHTML = `
                    <div style="color: var(--text-muted); text-align: center; padding: 20px;">
                        Unable to load dashboard data. Make sure the API server is running.
                    </div>
                `;
            }
        }

        function getScoreClass(score) {
            if (!score || score >= 70) return 'score-hot';
            if (score >= 40) return 'score-warm';
            return 'score-cold';
        }

        function getEventIcon(eventType) {
            if (eventType?.includes('replied')) return 'reply';
            if (eventType?.includes('email')) return 'email';
            if (eventType?.includes('booked')) return 'booked';
            return 'lead';
        }

        function getEventEmoji(eventType) {
            if (eventType?.includes('replied')) return '💬';
            if (eventType?.includes('email_sent')) return '📧';
            if (eventType?.includes('booked')) return '📅';
            return '🔔';
        }

        function formatEventType(eventType) {
            return (eventType || 'event').replace(/_/g, ' ');
        }

        function timeAgo(date) {
            if (!date) return '—';
            const seconds = Math.floor((new Date() - new Date(date)) / 1000);
            if (seconds < 60) return 'just now';
            if (seconds < 3600) return Math.floor(seconds / 60) + 'm ago';
            if (seconds < 86400) return Math.floor(seconds / 3600) + 'h ago';
            return Math.floor(seconds / 86400) + 'd ago';
        }

        function viewLead(id) {
            window.open(`/lead/${id}?client=${CLIENT_ID}`, '_blank');
        }

        function refreshData() {
            loadDashboard();
        }

        function exportCSV() {
            alert('Export feature - would download CSV of all leads');
        }

        // Initial load
        loadDashboard();

        // Auto-refresh every 30 seconds
        setInterval(loadDashboard, 30000);
    </script>
</body>
</html>
